<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>بازی دوز - عرفان</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 16px;
    }
    button { font-family: inherit; outline: none; }
    #root { width: 100%; display: flex; justify-content: center; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useReducer } = React;

// ── Constants ──────────────────────────────────────────────────────────────
const WINNING_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

const LEVELS = [
  { id:1, name:"خیلی آسون", emoji:"🐣", color:"#22c55e", desc:"تقریباً همیشه اشتباه می‌کنه" },
  { id:2, name:"آسون",      emoji:"😊", color:"#84cc16", desc:"گاهی اشتباه می‌کنه" },
  { id:3, name:"متوسط",     emoji:"🧠", color:"#f59e0b", desc:"گاهی باهوش، گاهی نه!" },
  { id:4, name:"سخت",       emoji:"😤", color:"#ef4444", desc:"خیلی سخته ببریش" },
  { id:5, name:"خیلی سخت", emoji:"💀", color:"#a855f7", desc:"تقریباً غیرممکنه ببری!" },
];

// ── Static style objects (defined outside component) ───────────────────────
const PAGE_STYLE = {
  textAlign:"center", width:"100%", maxWidth:400
};

const BACK_BTN = {
  background:"none", border:"1px solid #ffffff33", color:"#a0a8c0",
  borderRadius:20, padding:"6px 14px", cursor:"pointer", fontSize:12
};

const MAIN_MENU_BTN = {
  background:"linear-gradient(135deg,#1e293b,#0f172a)",
  border:"1px solid #ffffff25", color:"#e2e8f0",
  borderRadius:12, padding:"9px 18px", cursor:"pointer",
  fontSize:13, fontWeight:600, marginBottom:14, display:"inline-block"
};

const RESET_BTN = {
  flex:1, background:"linear-gradient(135deg,#e94560,#c73652)",
  border:"none", borderRadius:12, color:"white",
  padding:"12px", fontSize:15, fontWeight:700, cursor:"pointer",
  boxShadow:"0 4px 15px #e9456040"
};

const BOARD_WRAPPER = {
  display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10,
  marginBottom:16, padding:14, background:"#ffffff08",
  borderRadius:20, border:"1px solid #ffffff15"
};

const TITLE_STYLE = {
  fontSize:38, fontWeight:800, margin:"0 0 6px",
  background:"linear-gradient(90deg,#e94560,#3b82f6)",
  WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", letterSpacing:2
};

function menuBtnStyle(bg, hover) {
  return {
    background:`linear-gradient(135deg,${bg},${hover})`,
    border:"none", borderRadius:14, color:"white",
    padding:"16px 48px", fontSize:17, fontWeight:700,
    cursor:"pointer", width:280, boxShadow:`0 4px 20px ${bg}60`
  };
}

const MENU_AI_BTN  = menuBtnStyle("#e94560","#c73652");
const MENU_PVP_BTN = menuBtnStyle("#0f3460","#1a4a8a");

// ── Game logic (pure functions, defined outside component) ──────────────────
function calculateWinner(sq) {
  for (const [a,b,c] of WINNING_LINES)
    if (sq[a] && sq[a]===sq[b] && sq[a]===sq[c]) return { winner:sq[a], line:[a,b,c] };
  return null;
}

function getEmptyIndices(sq) {
  return sq.reduce((acc,v,i) => { if (v===null) acc.push(i); return acc; }, []);
}

// Minimax with alpha-beta pruning (fix #8)
function minimax(sq, isMax, alpha, beta, depth=0) {
  const r = calculateWinner(sq);
  if (r) return r.winner==="O" ? 10-depth : depth-10;
  const empty = getEmptyIndices(sq);
  if (empty.length===0) return 0;

  if (isMax) {
    let best = -Infinity;
    for (const i of empty) {
      const n = sq.slice(); n[i]="O";
      const score = minimax(n, false, alpha, beta, depth+1);
      best = Math.max(best, score);
      alpha = Math.max(alpha, best);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const i of empty) {
      const n = sq.slice(); n[i]="X";
      const score = minimax(n, true, alpha, beta, depth+1);
      best = Math.min(best, score);
      beta = Math.min(beta, best);
      if (beta <= alpha) break;
    }
    return best;
  }
}

// Depth-limited minimax for level 3 (fix #3)
function minimaxLimited(sq, isMax, alpha, beta, depth=0, maxDepth=2) {
  const r = calculateWinner(sq);
  if (r) return r.winner==="O" ? 10-depth : depth-10;
  const empty = getEmptyIndices(sq);
  if (empty.length===0 || depth===maxDepth) return 0;

  if (isMax) {
    let best = -Infinity;
    for (const i of empty) {
      const n = sq.slice(); n[i]="O";
      best = Math.max(best, minimaxLimited(n, false, alpha, beta, depth+1, maxDepth));
      alpha = Math.max(alpha, best);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const i of empty) {
      const n = sq.slice(); n[i]="X";
      best = Math.min(best, minimaxLimited(n, true, alpha, beta, depth+1, maxDepth));
      beta = Math.min(beta, best);
      if (beta <= alpha) break;
    }
    return best;
  }
}

function getBestMove(sq) {
  const empty = getEmptyIndices(sq);
  if (empty.length===0) return -1; // fix #5
  let bestScore=-Infinity, bestMove=-1;
  for (const i of empty) {
    const n=sq.slice(); n[i]="O";
    const s=minimax(n,false,-Infinity,Infinity);
    if (s>bestScore) { bestScore=s; bestMove=i; }
  }
  return bestMove;
}

function getMediumMove(sq) {
  const empty = getEmptyIndices(sq);
  if (empty.length===0) return -1;
  let bestScore=-Infinity, bestMove=-1;
  for (const i of empty) {
    const n=sq.slice(); n[i]="O";
    const s=minimaxLimited(n,false,-Infinity,Infinity,0,2);
    if (s>bestScore) { bestScore=s; bestMove=i; }
  }
  return bestMove;
}

function getRandomMove(sq) {
  const empty = getEmptyIndices(sq);
  if (empty.length===0) return -1; // fix #5
  return empty[Math.floor(Math.random()*empty.length)];
}

function getSmartMove(sq) {
  const empty = getEmptyIndices(sq);
  if (empty.length===0) return -1; // fix #5
  // Try to win
  for (const [a,b,c] of WINNING_LINES) {
    const v=[sq[a],sq[b],sq[c]];
    if (v.filter(x=>x==="O").length===2 && v.includes(null))
      return [a,b,c][v.indexOf(null)];
  }
  // Block player
  for (const [a,b,c] of WINNING_LINES) {
    const v=[sq[a],sq[b],sq[c]];
    if (v.filter(x=>x==="X").length===2 && v.includes(null))
      return [a,b,c][v.indexOf(null)];
  }
  if (!sq[4]) return 4;
  for (const i of [0,2,6,8]) if (!sq[i]) return i;
  return getRandomMove(sq);
}

function getAIMove(sq, level) {
  const empty = getEmptyIndices(sq);
  if (empty.length===0) return -1; // fix #5 guard
  const r = Math.random();
  let move = -1;
  if      (level===1) move = r<0.9 ? getRandomMove(sq) : getSmartMove(sq);
  else if (level===2) move = r<0.65? getRandomMove(sq) : getSmartMove(sq);
  else if (level===3) move = getMediumMove(sq);          // fix #3
  else if (level===4) move = r<0.15? getRandomMove(sq) : getBestMove(sq);
  else                move = getBestMove(sq);
  // fix #5: fallback guard — never return -1 when moves exist
  if (move===-1) move = empty[0];
  return move;
}

// ── Reducer (fix #7) ────────────────────────────────────────────────────────
const INIT_GAME = {
  squares: Array(9).fill(null),
  isPlayerTurn: true,
  xIsNext: true,
  animating: false,
  scores: { X:0, O:0, draw:0 }
};

function gameReducer(state, action) {
  switch(action.type) {
    case "MOVE": {
      const squares = action.squares;
      const w = calculateWinner(squares);
      const d = !w && squares.every(Boolean);
      const scores = w
        ? {...state.scores, [w.winner]: state.scores[w.winner]+1}
        : d ? {...state.scores, draw: state.scores.draw+1}
            : state.scores;
      return {
        ...state,
        squares,
        scores,
        xIsNext: action.pvp ? !state.xIsNext : state.xIsNext,
        isPlayerTurn: action.pvp ? state.isPlayerTurn : false,
        animating: !action.pvp && !w && !d
      };
    }
    case "AI_MOVE": {
      const squares = action.squares;
      const w = calculateWinner(squares);
      const d = !w && squares.every(Boolean);
      const scores = w
        ? {...state.scores, [w.winner]: state.scores[w.winner]+1}
        : d ? {...state.scores, draw: state.scores.draw+1}
            : state.scores;
      return { ...state, squares, scores, isPlayerTurn:true, animating:false };
    }
    case "RESET":
      return { ...INIT_GAME, scores: state.scores };
    case "FULL_RESET":
      return INIT_GAME;
    default:
      return state;
  }
}

// ── Main App ────────────────────────────────────────────────────────────────
function App() {
  const [mode, setMode]       = useState("menu");
  const [aiLevel, setAiLevel] = useState(3);
  const [game, dispatch]      = useReducer(gameReducer, INIT_GAME);

  const { squares, isPlayerTurn, xIsNext, animating, scores } = game;
  const result  = calculateWinner(squares);
  const isDraw  = !result && squares.every(Boolean);
  const gameOver = !!(result || isDraw);
  const currentLevel = LEVELS.find(l=>l.id===aiLevel);

  // fix #1 — useEffect-based AI trigger (replaces setTimeout in click handler)
  useEffect(() => {
    if (mode!=="ai" || isPlayerTurn || gameOver) return;
    const delay = aiLevel===5?400 : aiLevel===4?500 : 600;
    const id = setTimeout(() => {
      const move = getAIMove(squares, aiLevel);
      if (move!==-1) {
        const next = squares.slice(); next[move]="O";
        dispatch({ type:"AI_MOVE", squares:next });
      } else {
        dispatch({ type:"AI_MOVE", squares });
      }
    }, delay);
    return () => clearTimeout(id); // cleanup fix #1
  }, [isPlayerTurn, squares, mode, aiLevel, gameOver]);

  // fix #2 — useCallback for handleClick
  const handleClick = useCallback((i) => {
    if (animating || squares[i] || gameOver) return;
    if (mode==="ai" && !isPlayerTurn) return;
    const next = squares.slice();
    next[i] = mode==="pvp" ? (xIsNext?"X":"O") : "X";
    dispatch({ type:"MOVE", squares:next, pvp: mode==="pvp" });
  }, [animating, squares, gameOver, mode, isPlayerTurn, xIsNext]);

  const reset    = useCallback(() => dispatch({ type:"RESET" }), []);
  const fullReset= useCallback(() => dispatch({ type:"FULL_RESET" }), []);

  function goMenu() { setMode("menu"); fullReset(); }

  function startAI(level) {
    setAiLevel(level); setMode("ai"); fullReset();
  }
  function startPVP() {
    setMode("pvp"); fullReset();
  }

  const winLine = result?.line || [];

  function getStatus() {
    if (result) return mode==="ai"
      ? (result.winner==="X" ? "🎉 بردی!" : `${currentLevel.emoji} هوش مصنوعی برد!`)
      : `🏆 بازیکن ${result.winner} برد!`;
    if (isDraw) return "🤝 مساوی!";
    if (mode==="ai") return isPlayerTurn ? "نوبت توست (X)" : `${currentLevel.emoji} در حال فکر کردن...`;
    return `نوبت بازیکن ${xIsNext?"X":"O"}`;
  }

  // ── MENU ──
  if (mode==="menu") return (
    <div style={{textAlign:"center"}}>
      <div style={{fontSize:72,marginBottom:4}}>⭕❌</div>
      <h1 style={TITLE_STYLE}>بازی دوز</h1>
      <p style={{color:"#a0a8c0",marginBottom:36,fontSize:15}}>حالت بازی را انتخاب کنید</p>
      <div style={{display:"flex",flexDirection:"column",gap:14,alignItems:"center"}}>
        <button onClick={()=>setMode("levelPicker")} style={MENU_AI_BTN}>🤖 بازی با هوش مصنوعی</button>
        <button onClick={startPVP} style={MENU_PVP_BTN}>👥 دو نفره</button>
      </div>
      <p style={{marginTop:40,fontSize:13,color:"#ffffff40",letterSpacing:1}}>
        ساخته شده توسط <span style={{color:"#e94560cc",fontWeight:700}}>عرفان</span>
      </p>
    </div>
  );

  // ── LEVEL PICKER ──
  if (mode==="levelPicker") return (
    <div style={{width:"100%",maxWidth:420}}>
      <button onClick={goMenu} style={MAIN_MENU_BTN}>🏠 منوی اصلی</button>
      <h2 style={{textAlign:"center",fontSize:22,marginBottom:6,color:"#e2e8f0",marginTop:4}}>
        🤖 انتخاب سطح هوش مصنوعی
      </h2>
      <p style={{textAlign:"center",color:"#a0a8c0",fontSize:13,marginBottom:24}}>
        سطح دشواری مورد نظرت رو انتخاب کن
      </p>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {LEVELS.map(lvl => (
          <button
            key={lvl.id}
            onClick={()=>startAI(lvl.id)}
            style={{
              background:`linear-gradient(135deg,${lvl.color}22,${lvl.color}11)`,
              border:`2px solid ${lvl.color}55`, borderRadius:16,
              padding:"14px 20px", cursor:"pointer",
              display:"flex", alignItems:"center", gap:14, color:"white", width:"100%"
            }}
            onMouseOver={e=>e.currentTarget.style.background=`linear-gradient(135deg,${lvl.color}44,${lvl.color}22)`}
            onMouseOut={e=>e.currentTarget.style.background=`linear-gradient(135deg,${lvl.color}22,${lvl.color}11)`}
          >
            <span style={{fontSize:32}}>{lvl.emoji}</span>
            <div style={{flex:1,textAlign:"right"}}>
              <div style={{fontWeight:700,fontSize:17,color:lvl.color}}>{lvl.name}</div>
              <div style={{fontSize:12,color:"#a0a8c0",marginTop:2}}>{lvl.desc}</div>
            </div>
            <div style={{display:"flex",gap:3}}>
              {[1,2,3,4,5].map(s=>(
                <div key={s} style={{width:6,height:6,borderRadius:"50%",background:s<=lvl.id?lvl.color:"#ffffff20"}}/>
              ))}
            </div>
          </button>
        ))}
      </div>
    </div>
  );

  // ── GAME BOARD ──
  return (
    <div style={PAGE_STYLE}>
      {/* Header */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={goMenu} style={MAIN_MENU_BTN}>🏠 منوی اصلی</button>
          {mode==="ai" && (
            <button onClick={()=>setMode("levelPicker")} style={{
              background:`${currentLevel.color}22`,
              border:`1px solid ${currentLevel.color}55`,
              color:currentLevel.color, borderRadius:20,
              padding:"5px 12px", cursor:"pointer", fontSize:12, fontWeight:600
            }}>
              {currentLevel.emoji} {currentLevel.name}
            </button>
          )}
        </div>
        <h2 style={{margin:0,fontSize:20,color:"#e2e8f0"}}>
          {mode==="ai"?"🤖 بازی با هوش مصنوعی":"👥 دو نفره"}
        </h2>
      </div>

      {/* Score */}
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        {[
          {label:mode==="ai"?"شما (X)":"بازیکن X", key:"X", color:"#e94560"},
          {label:"مساوی",                           key:"draw", color:"#64748b"},
          {label:mode==="ai"?`${currentLevel?.emoji??"🤖"} AI`:"بازیکن O", key:"O", color:"#3b82f6"},
        ].map(({label,key,color})=>(
          <div key={key} style={{background:"#ffffff10",borderRadius:12,padding:"10px 12px",border:`1px solid ${color}44`,flex:1}}>
            <div style={{fontSize:22,fontWeight:800,color}}>{scores[key]}</div>
            <div style={{fontSize:10,color:"#a0a8c0",marginTop:2}}>{label}</div>
          </div>
        ))}
      </div>

      {/* Status */}
      <div style={{
        background:result?"#fbbf2415":isDraw?"#64748b15":"#ffffff08",
        border:`1px solid ${result?"#fbbf2440":isDraw?"#64748b40":"#ffffff20"}`,
        borderRadius:12, padding:"12px 20px", marginBottom:20,
        fontSize:15, fontWeight:600,
        color:result?"#fbbf24":isDraw?"#94a3b8":"#e2e8f0",
        minHeight:46, display:"flex", alignItems:"center", justifyContent:"center"
      }}>
        {getStatus()}
      </div>

      {/* Board — fix #6: disabled when game over */}
      <div style={BOARD_WRAPPER}>
        {squares.map((val,i)=>{
          const isWin = winLine.includes(i);
          const disabled = !!val || gameOver || (mode==="ai" && !isPlayerTurn);
          return (
            <button
              key={i}
              onClick={()=>handleClick(i)}
              disabled={disabled}
              style={{
                aspectRatio:"1", width:"100%",
                background:isWin?"#fbbf2420":"#ffffff05",
                border:isWin?"2px solid #fbbf24":"2px solid #ffffff15",
                borderRadius:14, fontSize:40, fontWeight:800,
                color:val==="X"?"#e94560":"#3b82f6",
                cursor:disabled?"default":"pointer",
                transition:"all 0.15s",
                transform:isWin?"scale(1.06)":"scale(1)",
                pointerEvents:disabled?"none":"auto"  // fix #6
              }}
              onMouseOver={e=>{if(!disabled) e.currentTarget.style.background="#ffffff18";}}
              onMouseOut={e=>{if(!disabled) e.currentTarget.style.background="#ffffff05";}}
            >
              {val==="X"?"✕":val==="O"?"◯":""}
            </button>
          );
        })}
      </div>

      {/* Buttons */}
      <div style={{display:"flex",gap:10}}>
        <button onClick={reset} style={RESET_BTN}>🔄 بازی جدید</button>
        {mode==="ai" && (
          <button onClick={()=>setMode("levelPicker")} style={{
            background:`linear-gradient(135deg,${currentLevel.color}88,${currentLevel.color}55)`,
            border:"none", borderRadius:12, color:"white",
            padding:"12px 16px", fontSize:15, fontWeight:700, cursor:"pointer"
          }}>⚙️ سطح</button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
