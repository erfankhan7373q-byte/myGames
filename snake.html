<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بازی مار 🐍</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Vazirmatn', sans-serif;
    color: #fff;
    user-select: none;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #39ff14, #00e5ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .scoreboard {
    display: flex;
    gap: 32px;
    margin-bottom: 20px;
  }

  .score-box {
    text-align: center;
  }

  .score-label {
    font-size: 0.7rem;
    color: #666;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .score-value {
    font-size: 1.8rem;
    font-weight: 900;
    color: #39ff14;
  }

  #best .score-value {
    color: #00e5ff;
  }

  canvas {
    border: 2px solid #1a1a1a;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(57, 255, 20, 0.15), 0 0 80px rgba(57, 255, 20, 0.05);
    background: #111;
    display: block;
  }

  .controls {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-direction: column;
    align-items: center;
  }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  .ctrl-btn {
    width: 52px;
    height: 52px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 10px;
    color: #fff;
    font-size: 1.4rem;
    cursor: pointer;
    transition: background 0.1s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ctrl-btn:active {
    background: #39ff14;
    color: #000;
    transform: scale(0.93);
  }

  .hint {
    margin-top: 14px;
    font-size: 0.75rem;
    color: #444;
    text-align: center;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    backdrop-filter: blur(4px);
  }

  #overlay h2 {
    font-size: 2.5rem;
    font-weight: 900;
    color: #39ff14;
    margin-bottom: 10px;
  }

  #overlay p {
    color: #aaa;
    margin-bottom: 30px;
    font-size: 1rem;
  }

  #overlay .final-score {
    font-size: 3rem;
    font-weight: 900;
    color: #fff;
    margin-bottom: 30px;
  }

  .play-btn {
    background: #39ff14;
    color: #000;
    border: none;
    padding: 14px 40px;
    border-radius: 50px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Vazirmatn', sans-serif;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 20px rgba(57,255,20,0.4);
  }

  .play-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(57,255,20,0.6);
  }
</style>
</head>
<body>

<h1>🐍 بازی مار</h1>

<div class="scoreboard">
  <div class="score-box" id="current">
    <div class="score-label">امتیاز</div>
    <div class="score-value" id="scoreDisplay">0</div>
  </div>
  <div class="score-box" id="best">
    <div class="score-label">بهترین</div>
    <div class="score-value" id="bestDisplay">0</div>
  </div>
</div>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<div class="controls">
  <div class="btn-row">
    <button class="ctrl-btn" id="btnUp">▲</button>
  </div>
  <div class="btn-row">
    <button class="ctrl-btn" id="btnLeft">◄</button>
    <button class="ctrl-btn" id="btnDown">▼</button>
    <button class="ctrl-btn" id="btnRight">►</button>
  </div>
</div>

<p class="hint">کیبورد: کلیدهای جهت‌دار یا WASD</p>

<div id="overlay">
  <h2>🐍 بازی مار</h2>
  <p>مار رو هدایت کن، غذا بخور، به خودت نخوری!</p>
  <button class="play-btn" id="startBtn">شروع بازی</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const bestDisplay = document.getElementById('bestDisplay');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, score, best, gameLoop, running;

best = 0;

function init() {
  snake = [
    {x: 10, y: 10},
    {x: 9, y: 10},
    {x: 8, y: 10}
  ];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  scoreDisplay.textContent = 0;
  placeFood();
}

function placeFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function update() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreDisplay.textContent = score;
    if (score > best) { best = score; bestDisplay.textContent = best; }
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = '#1a1a1a';
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.beginPath();
      ctx.arc(x * GRID + GRID/2, y * GRID + GRID/2, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Food
  const fx = food.x * GRID + GRID/2;
  const fy = food.y * GRID + GRID/2;
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(fx, fy, GRID/2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const x = seg.x * GRID + 1;
    const y = seg.y * GRID + 1;
    const size = GRID - 2;
    const ratio = 1 - (i / snake.length) * 0.5;
    ctx.shadowColor = '#39ff14';
    ctx.shadowBlur = i === 0 ? 16 : 4;
    ctx.fillStyle = i === 0
      ? '#39ff14'
      : `rgba(${Math.floor(57*ratio)}, ${Math.floor(255*ratio)}, ${Math.floor(20*ratio)}, 1)`;
    const r = i === 0 ? 7 : 4;
    ctx.beginPath();
    ctx.roundRect(x, y, size, size, r);
    ctx.fill();
  });

  ctx.shadowBlur = 0;

  // Eyes on head
  const hx = snake[0].x * GRID;
  const hy = snake[0].y * GRID;
  ctx.fillStyle = '#000';
  if (dir.x === 1) {
    ctx.beginPath(); ctx.arc(hx+14, hy+5, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx+14, hy+15, 2.5, 0, Math.PI*2); ctx.fill();
  } else if (dir.x === -1) {
    ctx.beginPath(); ctx.arc(hx+6, hy+5, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx+6, hy+15, 2.5, 0, Math.PI*2); ctx.fill();
  } else if (dir.y === -1) {
    ctx.beginPath(); ctx.arc(hx+5, hy+6, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx+15, hy+6, 2.5, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(hx+5, hy+14, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx+15, hy+14, 2.5, 0, Math.PI*2); ctx.fill();
  }
}

function gameOver() {
  clearInterval(gameLoop);
  running = false;
  overlay.innerHTML = `
    <h2>بازی تموم شد! 💀</h2>
    <p>امتیاز نهایی</p>
    <div class="final-score">${score}</div>
    <button class="play-btn" id="startBtn">دوباره بازی کن</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function startGame() {
  overlay.style.display = 'none';
  init();
  running = true;
  const speed = 130;
  gameLoop = setInterval(update, speed);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (!running) return;
  const map = {
    ArrowUp: {x:0,y:-1}, w: {x:0,y:-1}, W: {x:0,y:-1},
    ArrowDown: {x:0,y:1}, s: {x:0,y:1}, S: {x:0,y:1},
    ArrowLeft: {x:-1,y:0}, a: {x:-1,y:0}, A: {x:-1,y:0},
    ArrowRight: {x:1,y:0}, d: {x:1,y:0}, D: {x:1,y:0}
  };
  const nd = map[e.key];
  if (nd && !(nd.x === -dir.x && nd.y === -dir.y)) {
    nextDir = nd;
    e.preventDefault();
  }
});

// Mobile buttons
document.getElementById('btnUp').addEventListener('click', () => { if(!(0===-dir.x && -1===-dir.y)) nextDir={x:0,y:-1}; });
document.getElementById('btnDown').addEventListener('click', () => { if(!(0===-dir.x && 1===-dir.y)) nextDir={x:0,y:1}; });
document.getElementById('btnLeft').addEventListener('click', () => { if(!(-1===-dir.x && 0===-dir.y)) nextDir={x:-1,y:0}; });
document.getElementById('btnRight').addEventListener('click', () => { if(!(1===-dir.x && 0===-dir.y)) nextDir={x:1,y:0}; });

startBtn.addEventListener('click', startGame);
</script>
</body>
</html>
