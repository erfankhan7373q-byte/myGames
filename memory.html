<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بازی حافظه 🃏</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a1628;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Vazirmatn',sans-serif;
    color:#fff;
    padding:20px;
    user-select:none;
  }
  h1 {
    font-size:2rem; font-weight:900;
    background:linear-gradient(135deg,#34d399,#60a5fa);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:6px;
  }
  .subtitle { font-size:.8rem; color:#4a6080; margin-bottom:18px; }
  .top-bar {
    display:flex; gap:20px; margin-bottom:18px; align-items:center; flex-wrap:wrap; justify-content:center;
  }
  .sbox { text-align:center; background:#0f2040; border:1px solid #1a3050; border-radius:10px; padding:7px 18px; }
  .slabel { font-size:.62rem; color:#3a5070; letter-spacing:1px; text-transform:uppercase; }
  .sval { font-size:1.4rem; font-weight:900; color:#34d399; }
  .sval.b { color:#60a5fa; }
  .sval.t { color:#fbbf24; }
  .new-btn {
    background:linear-gradient(135deg,#34d399,#60a5fa);
    color:#fff; border:none;
    padding:9px 22px; border-radius:10px;
    font-size:.88rem; font-weight:700;
    cursor:pointer; font-family:'Vazirmatn',sans-serif;
    transition:transform .12s;
  }
  .new-btn:hover { transform:scale(1.04); }

  #grid {
    display:grid;
    grid-template-columns:repeat(4,90px);
    gap:12px;
  }

  .card {
    width:90px; height:90px;
    cursor:pointer;
    perspective:600px;
    position:relative;
  }
  .card-inner {
    width:100%; height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .35s ease;
  }
  .card.flipped .card-inner { transform:rotateY(180deg); }
  .card.matched .card-inner { transform:rotateY(180deg); }

  .card-face {
    position:absolute; inset:0;
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
  }
  .card-back {
    background:linear-gradient(135deg,#0f2040,#1a3560);
    border:1px solid #1e3a60;
    font-size:2rem;
    color:#1e3a60;
  }
  .card-back::after { content:'?'; font-size:1.8rem; color:#1a3060; }
  .card-front {
    background:linear-gradient(135deg,#0f2040,#162a50);
    border:1px solid #2a4a70;
    font-size:2.6rem;
    transform:rotateY(180deg);
  }
  .card.matched .card-front {
    border-color:#34d399;
    background:linear-gradient(135deg,#0a2a1a,#0d3020);
    box-shadow:0 0 16px rgba(52,211,153,.3);
  }
  .card:not(.matched):not(.flipped):hover .card-inner {
    transform:rotateY(10deg);
  }

  .result-bar {
    margin-top:16px;
    height:6px; width:360px;
    background:#0f2040;
    border-radius:99px;
    overflow:hidden;
  }
  .result-fill {
    height:100%;
    background:linear-gradient(90deg,#34d399,#60a5fa);
    border-radius:99px;
    transition:width .4s ease;
    width:0%;
  }

  #overlay {
    position:fixed; inset:0;
    background:rgba(0,0,0,.88);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:10; backdrop-filter:blur(6px);
  }
  #overlay h2 { font-size:2.3rem; font-weight:900; color:#34d399; margin-bottom:8px; }
  #overlay p  { color:#888; margin-bottom:22px; text-align:center; padding:0 20px; }
  .final { font-size:1.2rem; font-weight:700; color:#fbbf24; margin-bottom:28px; text-align:center; }
  .pbtn {
    background:linear-gradient(135deg,#34d399,#60a5fa);
    color:#fff; border:none;
    padding:13px 38px; border-radius:50px;
    font-size:1.05rem; font-weight:700;
    cursor:pointer; font-family:'Vazirmatn',sans-serif;
    box-shadow:0 0 24px rgba(52,211,153,.3);
    transition:transform .15s;
  }
  .pbtn:hover { transform:scale(1.05); }

  @media(max-width:420px){
    #grid { grid-template-columns:repeat(4,68px); gap:8px; }
    .card { width:68px; height:68px; }
    .card-front { font-size:2rem; }
    .result-bar { width:280px; }
  }
</style>
</head>
<body>
<h1>🃏 بازی حافظه</h1>
<p class="subtitle">جفت‌ها رو با کمترین تلاش پیدا کن!</p>

<div class="top-bar">
  <div class="sbox"><div class="slabel">تلاش</div><div class="sval t" id="moves">0</div></div>
  <div class="sbox"><div class="slabel">جفت یافته</div><div class="sval" id="pairs">0/8</div></div>
  <div class="sbox"><div class="slabel">رکورد</div><div class="sval b" id="best">-</div></div>
  <button class="new-btn" id="newBtn">بازی جدید</button>
</div>

<div id="grid"></div>
<div class="result-bar"><div class="result-fill" id="prog"></div></div>

<div id="overlay">
  <h2>🃏 بازی حافظه</h2>
  <p>کارت‌ها رو برگردون و جفت‌های یکسان رو پیدا کن!</p>
  <button class="pbtn" id="startBtn">شروع بازی</button>
</div>

<script>
const EMOJIS = ['🐶','🦊','🐼','🦁','🐸','🦋','🌺','🍕','🎸','🚀','⭐','💎'];
const grid = document.getElementById('grid');
const ov   = document.getElementById('overlay');
let cards=[], flipped=[], matched=0, moves=0, best=Infinity, locked=false;

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function startGame() {
  ov.style.display='none';
  matched=0; moves=0; flipped=[]; locked=false;
  document.getElementById('moves').textContent=0;
  document.getElementById('pairs').textContent='0/8';
  document.getElementById('prog').style.width='0%';

  const selected = shuffle([...EMOJIS]).slice(0,8);
  const set = shuffle([...selected,...selected]);
  grid.innerHTML='';
  cards=[];

  set.forEach((emoji,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div class="card-inner"><div class="card-face card-back"></div><div class="card-face card-front">${emoji}</div></div>`;
    card.dataset.emoji=emoji;
    card.dataset.idx=i;
    card.addEventListener('click',()=>onFlip(card));
    grid.appendChild(card);
    cards.push(card);
  });
}

function onFlip(card) {
  if(locked) return;
  if(card.classList.contains('flipped')||card.classList.contains('matched')) return;
  if(flipped.length>=2) return;

  card.classList.add('flipped');
  flipped.push(card);

  if(flipped.length===2) {
    moves++;
    document.getElementById('moves').textContent=moves;
    locked=true;
    setTimeout(check,700);
  }
}

function check() {
  const [a,b]=flipped;
  if(a.dataset.emoji===b.dataset.emoji) {
    a.classList.add('matched'); b.classList.add('matched');
    matched++;
    document.getElementById('pairs').textContent=matched+'/8';
    document.getElementById('prog').style.width=(matched/8*100)+'%';
    if(matched===8) setTimeout(()=>win(),400);
  } else {
    a.classList.remove('flipped'); b.classList.remove('flipped');
  }
  flipped=[]; locked=false;
}

function win() {
  if(moves<best) best=moves;
  document.getElementById('best').textContent=best+' تلاش';
  ov.innerHTML=`
    <h2>🎉 بردی!</h2>
    <p>همه جفت‌ها رو پیدا کردی!</p>
    <div class="final">تعداد تلاش: ${moves}<br>${moves===best?'🏆 رکورد جدید!':''}</div>
    <button class="pbtn" id="startBtn">دوباره بازی</button>
  `;
  ov.style.display='flex';
  document.getElementById('startBtn').addEventListener('click',startGame);
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('newBtn').addEventListener('click',startGame);
</script>
</body>
</html>
